name: Build Vertex AI Components
on: workflow_dispatch

env:
    SERVICE_ACCOUNT: 'vertexai-runner@companytesting-480806.iam.gserviceaccount.com'
    WIF_PROVIDER: 'projects/558007337566/locations/global/workloadIdentityPools/github-pool/providers/my-repo'
    IMAGE_NAME: 'clean-data'
    PROJECT_ID: 'companytesting-480806'
    REGION: 'us-central1'
    ARTIFACT_REPO_NAME: 'component-x-dev-containers'
    DEFAULT_CONTAINER_URL: 'docker.pkg.dev'
jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
          contents: 'read'
          id-token: 'write'
        steps:
            - name: check out code
              uses: actions/checkout@v7
            - name: Google Auth
              id: auth
              uses: google-github-actions/auth@v3
              with:
                    token_format: 'access_token'
                    workload_identity_provider: ${{ env.WIF_PROVIDER }}
                    service_account: ${{ env.SERVICE_ACCOUNT }}
            
            - name: docker login on artifact registry
              uses: docker/login-action@v4.4.0
              with:
                registry: ${{ env.REGION }}-${{ env.DEFAULT_CONTAINER_URL }}
                username: 'oauth2accesstoken'
                password: ${{ steps.auth.outputs.access_token }}
            - name: build and push container
              uses: docker/build-push-action@v7.3.0
              with:
                context: ./train_component
                push: true
                tags: |
                    ${{ env.REGION }}-${{ env.DEFAULT_CONTAINER_URL }}/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
